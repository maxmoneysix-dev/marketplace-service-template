# Render deployment configuration
# Deploy to Render: https://render.com

services:
  # Main API Server
  - type: web
    name: serp-api-server
    runtime: node
    plan: free
    region: ohio
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: AI_ENGINE_URL
        value: https://serp-ai-engine.onrender.com
      - key: MOONSHOT_API_KEY
        value: sk-H5M5pLgSe5w0IqmSxxuxJ98s7quLrAgdouv85hyAMzJaD1vx
      - key: PROXIES_SX_API_KEY
        value: free_trial
      - key: X402_PRIVATE_KEY
        value: 6wJg9tyKFbzjiM5kU0TD7wOIB80/bfxEgyp9dNyzKSsAf8/Vpenpg1MHx0QQC8ZnCkpZ+8p/SGv13hbNXKflOQ==
      - key: X402_RECEIVER_ADDRESS
        value: 12x3AzDYV6WUYjPuv7mh3a73WSZQZazSoJCzJqayw632
    healthCheckPath: /health
    autoDeploy: true

  # AI Engine (Python FastAPI)
  - type: web
    name: serp-ai-engine
    runtime: python
    plan: free
    region: ohio
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHONUNBUFFERED
        value: 1
      - key: PORT
        value: 10000
      - key: MOONSHOT_API_KEY
        value: sk-H5M5pLgSe5w0IqmSxxuxJ98s7quLrAgdouv85hyAMzJaD1vx
      - key: PROXIES_SX_API_KEY
        value: free_trial
    healthCheckPath: /health
    autoDeploy: true

  # Redis for caching
  - type: redis
    name: serp-redis
    plan: free
    region: ohio
    ipAllowList: []
